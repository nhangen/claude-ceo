name: Tests
on: [push, pull_request]
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          severity: warning
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run script tests
        run: |
          for t in scripts/*.test.sh; do
            echo "=== $t ==="
            bash "$t" || exit 1
          done
