name: Tests
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: ./scripts
          severity: warning
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Run script tests
        run: |
          fail=0
          count=0
          for t in scripts/*.test.sh; do
            echo "=== $t ==="
            count=$((count + 1))
            bash "$t" || fail=1
          done
          [ "$count" -ge 1 ] || { echo "no tests ran"; exit 1; }
          exit "$fail"
