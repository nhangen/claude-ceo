name: Tests
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: ./scripts
          severity: warning
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Run script tests
        run: |
          fail=0
          count=0
          for t in scripts/*.test.sh; do
            echo "=== $t ==="
            count=$((count + 1))
            bash "$t" || fail=1
          done
          [ "$count" -ge 1 ] || { echo "no tests ran"; exit 1; }
          exit "$fail"
      - name: ollama-agent pytest
        run: |
          python3 -m pip install --quiet pytest
          cd ollama-agent && python3 -m pytest -q
  scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      # Install bun via the official versioned script rather than a third-party
      # action, matching the repo's minimal-action posture.
      - name: Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.5"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
      # The scheduler depends on the cronbird package via a path dependency
      # ("cronbird": "file:../../../cronbird"), which resolves to a sibling of
      # the checkout dir. Clone it there so bun install can link it. cronbird is
      # public, so no credential is needed.
      - name: Check out cronbird (path dependency)
        run: |
          git clone --depth 1 https://github.com/nhangen/cronbird.git "${GITHUB_WORKSPACE}/../cronbird"
          # cronbird needs its own node_modules (croner) so module resolution
          # from its source resolves — bun links the package but hoists its deps
          # into the consumer tree, which cronbird's own files can't reach.
          ( cd "${GITHUB_WORKSPACE}/../cronbird" && bun install --frozen-lockfile )
      - name: scheduler lib — install, typecheck, test
        working-directory: lib/scheduler
        run: |
          bun install --frozen-lockfile
          bun run typecheck
          bun test
